<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Coding Manager{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="site-banner">
  <div class="banner-inner">
    <div class="banner-img-wrap">
      <img src="{{ url_for('static', filename='banner.png') }}" alt="Coding Manager" class="banner-img">
      <!-- 图片未就绪时的备用占位（删掉上面 img 标签后取消此注释）-->
      <!-- <div class="banner-placeholder"></div> -->

      <!-- 底部渐变遮罩，让图片自然融入页面背景 -->
      <div class="banner-fade"></div>

      <!-- attribution 卡片：悬浮在 banner 右侧中部 -->
      <a class="banner-credit" href="https://github.com/jasminemo1110" target="_blank" rel="noopener">
        <span class="credit-label">Made by</span>
        <span class="credit-name">茉白 Jasmine</span>
        <span class="credit-handle">@jasminemo1110 ↗</span>
      </a>

      <!-- 导航栏：压在 banner 最底部 -->
      <div class="banner-overlay">
        <a class="brand" href="{{ url_for('dashboard') }}">
          <span class="brand-mark">·</span>
          <span class="brand-name">Coding Manager</span>
        </a>
        <nav class="nav">
          <a href="{{ url_for('dashboard') }}">项目</a>
          <a href="{{ url_for('notes_list') }}">学习</a>
          <a href="{{ url_for('media_list') }}">自媒体</a>
          <a href="{{ url_for('settings') }}">设置</a>
          <a href="{{ url_for('guide') }}" class="nav-guide">快速上手</a>
        </nav>
      </div>
    </div>
  </div>
</div>
<main class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
