<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Coding 看板{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:wght@500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="{{ url_for('dashboard') }}">
      <span class="brand-mark">·</span>
      <span class="brand-name">Coding 看板</span>
    </a>
    <nav class="nav">
      <a href="{{ url_for('dashboard') }}">看板</a>
      <a href="{{ url_for('notes_list') }}">笔记</a>
      <a href="{{ url_for('media_list') }}">自媒体</a>
      <a href="{{ url_for('settings') }}">设置</a>
    </nav>
  </div>
</header>
<main class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
